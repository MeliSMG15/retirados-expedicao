<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retirados da Expedição · SMG15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root{
  --bg:#f0f2f7;
  --surface:#ffffff;
  --brand:#e5272a;
  --brand-lt:#fef2f2;
  --brand-dk:#c01f22;
  --brand-glow:rgba(229,39,42,.15);
  --navy:#111827;
  --slate:#374151;
  --muted:#6b7280;
  --border:#e5e7eb;
  --border-lt:#f3f4f6;
  --row-hover:#fafbfc;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 10px 30px rgba(0,0,0,.08);
  --shadow-lg:0 8px 16px rgba(0,0,0,.06),0 20px 40px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--navy);font-size:13.5px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ═══ TOPBAR ════════════════════════════════════════ */
.topbar{
  background:linear-gradient(135deg,#111827 0%,#1f2937 100%);
  border-bottom:2px solid var(--brand);
  padding:0 32px;height:68px;
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.25);
}
.brand{display:flex;align-items:center;gap:14px;flex:1}
.brand-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--brand),#f87171);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;box-shadow:0 4px 12px var(--brand-glow);
}
.brand-text{}
.brand-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.2px;line-height:1.2}
.brand-sub{color:#9ca3af;font-size:11px;letter-spacing:.3px;margin-top:1px}
.filters{display:flex;align-items:center;gap:8px}
.fpill{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:8px 14px;cursor:pointer;
  transition:all .2s;
}
.fpill:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18)}
.fpill svg{color:#9ca3af;flex-shrink:0}
.fpill input,.fpill select{
  border:none;outline:none;background:transparent;
  color:#f9fafb;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;
}
.fpill input{min-width:108px}
.fpill select{min-width:130px}
.fpill select option{color:#111;background:#fff}
.fpill input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5;cursor:pointer}
.fsep{color:rgba(255,255,255,.25);font-size:13px;margin:0 2px}
.btn{
  color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;
  font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;
  font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;letter-spacing:.1px;
}
.btn-refresh{
  background:linear-gradient(135deg,var(--brand),#f87171);
  box-shadow:0 4px 12px var(--brand-glow);
}
.btn-refresh:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--brand-glow)}
.btn-save{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 4px 12px rgba(5,150,105,.2)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(5,150,105,.3)}
.btn-save.saving{background:linear-gradient(135deg,#6b7280,#9ca3af);transform:none;cursor:not-allowed;box-shadow:none}

/* ═══ CONTENT ═══════════════════════════════════════ */
.content{padding:28px 32px;display:flex;flex-direction:column;gap:22px}

/* ═══ KPI ROW ════════════════════════════════════════ */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi-row-fin{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.kpi-card{
  background:var(--surface);border-radius:var(--radius);padding:20px 22px 18px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
  animation:fadeUp .35s ease both;cursor:default;
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-card:nth-child(2){animation-delay:.06s}
.kpi-card:nth-child(3){animation-delay:.12s}
.kpi-card:nth-child(4){animation-delay:.18s}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--kpi-accent,var(--brand));border-radius:var(--radius) var(--radius) 0 0;
}
.kpi-card-1{--kpi-accent:linear-gradient(90deg,#e5272a,#f87171)}
.kpi-card-2{--kpi-accent:linear-gradient(90deg,#2563eb,#60a5fa)}
.kpi-card-3{--kpi-accent:linear-gradient(90deg,#059669,#34d399)}
.kpi-card-4{--kpi-accent:linear-gradient(90deg,#d97706,#fbbf24)}
.kpi-card-usd{--kpi-accent:linear-gradient(90deg,#0284c7,#38bdf8)}
.kpi-card-brl{--kpi-accent:linear-gradient(90deg,#16a34a,#4ade80)}
.kpi-card-risk{--kpi-accent:linear-gradient(90deg,#dc2626,#fb923c)}
.ic-teal{background:linear-gradient(135deg,#ccfbf1,#99f6e4)}
.ic-sky{background:linear-gradient(135deg,#e0f2fe,#bae6fd)}
.kpi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.ic-red{background:linear-gradient(135deg,#fee2e2,#fecaca)}
.ic-blue{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.ic-green{background:linear-gradient(135deg,#d1fae5,#a7f3d0)}
.ic-amber{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.kpi-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.kpi-value{font-size:42px;font-weight:800;line-height:1;color:var(--navy);letter-spacing:-2px}
.kpi-value-xl{font-size:64px;letter-spacing:-3px}
.kpi-sub{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:6px}

/* ═══ CARDS ══════════════════════════════════════════ */
.card{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);
  overflow:hidden;animation:fadeUp .35s ease both;
}
.card-head{
  padding:16px 20px;border-bottom:1px solid var(--border-lt);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-shrink:0;background:linear-gradient(180deg,#fafbfc 0%,#ffffff 100%);
}
.card-title{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--slate);
}
.card-badge{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
  background:var(--brand-lt);color:var(--brand);border:1px solid #fecaca;
}

/* ═══ LAYOUT ══════════════════════════════════════════ */
.grid-a{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:stretch}
.grid-c{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.col{display:flex;flex-direction:column;gap:22px}
.grid-a>.card{display:flex;flex-direction:column}
.grid-a>.card .card-head{flex-shrink:0}

/* ═══ CHART ══════════════════════════════════════════ */
.chart-wrap{flex:1;min-height:270px;padding:18px 20px 28px;position:relative}

/* ═══ TABLES ══════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  background:linear-gradient(180deg,#f9fafb,#f3f4f6);
  color:var(--muted);font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;
  padding:11px 16px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
thead th:last-child{text-align:right}
tbody tr{transition:background .12s}
tbody tr:nth-child(even) td{background:#fafbfc}
tbody tr:hover td{background:#f0f2ff !important}
tbody td{
  padding:11px 16px;border-bottom:1px solid var(--border-lt);
  font-size:13px;color:var(--navy);
}
tbody td:last-child{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:var(--navy)}
tbody tr:last-child td{border-bottom:none}

.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:800;
  margin-right:8px;flex-shrink:0;vertical-align:middle;
}
.r1{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;box-shadow:0 2px 6px rgba(245,158,11,.3)}
.r2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#1e293b}
.r3{background:linear-gradient(135deg,#92400e,#b45309);color:#fff}
.rn{background:#f1f5f9;color:var(--muted)}

.trunc{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}

/* ═══ HEATMAP ══════════════════════════════════════════ */
.heat-table thead th{
  background:linear-gradient(135deg,#111827,#1f2937);
  color:rgba(255,255,255,.7);
}
.heat-table thead th:first-child{text-align:left;min-width:180px}
.heat-table tbody td{text-align:center !important;font-weight:700;font-size:12.5px}
.heat-table tbody td:first-child{text-align:left !important;font-weight:400;font-size:12px;color:var(--slate)}
.h0{color:#d1d5db}
.h1{background:#fef2f2;color:#dc2626}
.h2{background:#fecaca;color:#991b1b}
.h3{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}

/* ═══ PAGINATION ══════════════════════════════════════ */
.pag{
  display:flex;align-items:center;gap:6px;
  padding:11px 16px;border-top:1px solid var(--border-lt);
  font-size:12px;color:var(--muted);background:#fafbfc;
}
.pag-info{flex:1}
.pag-btn{
  width:30px;height:30px;border:1px solid var(--border);background:var(--surface);
  border-radius:8px;cursor:pointer;font-size:16px;color:var(--slate);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.pag-btn:hover:not(:disabled){background:var(--brand);color:#fff;border-color:var(--brand);transform:scale(1.05)}
.pag-btn:disabled{opacity:.3;cursor:default}

/* ═══ RISK CARD ════════════════════════════════════════ */
.risk-card{
  background:#fff;border-radius:var(--radius);
  border:2px solid #fecaca;
  box-shadow:0 4px 20px rgba(229,39,42,.1);
  overflow:hidden;animation:fadeUp .35s ease both;
}
.risk-card-head{
  background:linear-gradient(135deg,#dc2626,#b91c1c);
  padding:16px 22px;display:flex;align-items:center;gap:14px;
}
.risk-card-head-icon{font-size:22px}
.risk-card-head-text{flex:1}
.risk-card-head-title{color:#fff;font-size:14px;font-weight:700;letter-spacing:.2px}
.risk-card-head-sub{color:rgba(255,255,255,.75);font-size:12px;margin-top:2px}
.risk-summary{
  display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border-bottom:1px solid #fee2e2;
}
.risk-stat{
  padding:16px 22px;text-align:center;
  border-right:1px solid #fee2e2;
}
.risk-stat:last-child{border-right:none}
.risk-stat-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.risk-stat-value{font-size:28px;font-weight:800;line-height:1.1;margin-top:4px;letter-spacing:-1px}
.risk-stat-value.danger{color:#dc2626}
.risk-stat-value.warn{color:#d97706}
.risk-stat-value.ok{color:#059669}
.risk-tbl thead th{background:linear-gradient(180deg,#fff5f5,#fff1f2)}
.risk-tbl tbody tr:hover td{background:#fff5f5 !important}
.risk-empty{
  padding:32px;text-align:center;
  color:#16a34a;font-size:14px;font-weight:600;
}
.risk-empty::before{display:block;font-size:32px;margin-bottom:8px;content:'✅'}

/* ═══ DETAILS TABLE ════════════════════════════════════ */
.details-toolbar{
  padding:14px 20px;border-bottom:1px solid var(--border-lt);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:linear-gradient(180deg,#fafbfc,#fff);
}
.search-input{
  flex:1;min-width:220px;
  border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:all .2s;background:#fafbfc;color:var(--navy);
}
.search-input:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.search-input::placeholder{color:#9ca3af}
.btn-csv{
  background:linear-gradient(135deg,#111827,#1f2937);
  color:#fff;border:none;border-radius:10px;
  padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;
  transition:all .2s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.btn-csv:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.reinc-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:#fffbeb;color:#92400e;border:1px solid #fde68a;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;
  vertical-align:middle;margin-left:5px;cursor:help;
}
.reinc-badge-red{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.details-tbl thead th:last-child{text-align:left}
.details-tbl tbody td:last-child{text-align:left;font-weight:400}
.turno-am{
  background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1d4ed8;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.3px;
}
.turno-pm{
  background:linear-gradient(135deg,#f5f3ff,#ede9fe);color:#5b21b6;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.3px;
}

/* ═══ HISTORY PANEL ════════════════════════════════════ */
.history-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;padding:18px 20px;
}
.hist-day{
  border:1px solid var(--border);border-radius:12px;padding:14px 16px;
  cursor:pointer;transition:all .2s;background:var(--surface);
  position:relative;overflow:hidden;
}
.hist-day::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--brand),#f87171);
  opacity:0;transition:opacity .2s;
}
.hist-day:hover{
  border-color:var(--brand);
  box-shadow:0 4px 16px var(--brand-glow);
  transform:translateY(-2px);
}
.hist-day:hover::before{opacity:1}
.hist-day-date{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.hist-day-total{font-size:28px;font-weight:800;color:var(--brand);line-height:1.1;margin:4px 0;letter-spacing:-1px}
.hist-day-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ TOAST ════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:28px;right:28px;z-index:999;
  color:#fff;padding:13px 20px;border-radius:12px;
  font-size:13px;font-weight:600;
  box-shadow:0 8px 30px rgba(0,0,0,.2);
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:8px;
}
.toast.success{background:linear-gradient(135deg,#059669,#10b981)}
.toast.error{background:linear-gradient(135deg,var(--brand),#f87171)}
.toast:not(.success):not(.error){background:linear-gradient(135deg,#111827,#1f2937)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══ EMPTY / LOADING / ERROR ══════════════════════════ */
.empty{
  text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;
}
.empty::before{display:block;font-size:28px;margin-bottom:8px;content:attr(data-icon)}
.loader{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px;gap:16px;color:var(--muted);
}
.loader span{font-size:13px;font-weight:500}
.spinner{
  width:42px;height:42px;
  border:3px solid var(--border);border-top-color:var(--brand);
  border-radius:50%;animation:spin .75s linear infinite;
}
.spinner-sm{
  width:15px;height:15px;border-width:2px;display:inline-block;
  border-color:rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .75s linear infinite;vertical-align:middle;
}
.err-box{
  background:linear-gradient(135deg,#fff5f5,#fff);
  border:1px solid #fecaca;border-radius:var(--radius);
  padding:32px;color:var(--brand-dk);text-align:center;
}
.err-box strong{font-size:16px;font-weight:700;display:block;margin-bottom:8px}
.err-box small{color:var(--muted);font-size:12px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ═══ TABS ══════════════════════════════════════════ */
.tab-bar{
  background:#1a2332;
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:0 32px;display:flex;gap:2px;
}
.tab-btn{
  background:transparent;border:none;color:#6b7280;
  padding:13px 22px;cursor:pointer;font-size:13px;font-weight:600;
  border-bottom:3px solid transparent;transition:all .2s;
  font-family:'Inter',sans-serif;letter-spacing:.1px;
}
.tab-btn:hover{color:#d1d5db}
.tab-btn.active{color:#fff;border-bottom-color:var(--brand)}

/* ═══ RESSALVAS ═════════════════════════════════════ */
.res-op-bar{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border-radius:var(--radius);
  padding:14px 20px;box-shadow:var(--shadow);border:1px solid var(--border);
}
.res-op-bar label{font-size:13px;font-weight:600;color:var(--slate);white-space:nowrap}
.res-op-input{
  border:1px solid var(--border);border-radius:8px;padding:7px 12px;
  font-size:13px;font-family:'Inter',sans-serif;outline:none;
  color:var(--navy);transition:border .2s;flex:1;max-width:240px;
}
.res-op-input:focus{border-color:var(--brand)}
.res-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi-card-rev{--kpi-accent:linear-gradient(90deg,#059669,#34d399)}
.kpi-card-taxa{--kpi-accent:linear-gradient(90deg,#7c3aed,#a78bfa)}
.res-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.res-wrap-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;border-bottom:1px solid var(--border-lt);
}
.res-wrap-title{font-size:14px;font-weight:700;color:var(--navy)}
.res-wrap-sub{font-size:12px;color:var(--muted);margin-top:2px}
.res-tbl{width:100%;border-collapse:collapse}
.res-tbl thead th{
  background:linear-gradient(180deg,#f9fafb,#f3f4f6);
  color:var(--muted);font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;
  padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;
}
.res-tbl tbody td{
  padding:10px 14px;border-bottom:1px solid var(--border-lt);
  font-size:13px;color:var(--navy);vertical-align:middle;
}
.res-tbl tbody tr:last-child td{border-bottom:none}
.res-tbl tbody tr:hover:not(.rev-row) td{background:var(--row-hover)}
.rev-row td{background:linear-gradient(90deg,#f0fdf4,#ffffff)!important;color:#166534}

<body>

<!-- ═══ TOPBAR ═══════════════════════════════════════════════ -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">📦</div>
    <div class="brand-text">
      <div class="brand-title">Retirados da Expedição</div>
      <div class="brand-sub">SMG15 · Last Mile</div>
    </div>
  </div>
  <div class="filters">
    <div class="fpill">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <input type="date" id="dateStart">
    </div>
    <input type="hidden" id="dateEnd">
    <div class="fpill">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>

      </select>
    </div>
    <button class="btn btn-refresh" onclick="load()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Atualizar
    </button>
  </div>
</div>

<!-- ═══ TAB BAR ══════════════════════════════════════════════ -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-btn-dashboard" onclick="switchTab('dashboard')">📊 Dashboard</button>
  <button class="tab-btn" id="tab-btn-ressalvas" onclick="switchTab('ressalvas')">✅ Ressalvas</button>
</div>

<!-- ═══ DASHBOARD TAB ═════════════════════════════════════════ -->
<div id="tab-dashboard">
  <div class="content" id="content">
    <div class="loader"><div class="spinner"></div><span>Carregando dados…</span></div>
  </div>
</div>

<!-- ═══ RESSALVAS TAB ════════════════════════════════════════ -->
<div id="tab-ressalvas" style="display:none">
  <div class="content" id="ressalvas-content">
    <div class="loader"><div class="spinner"></div><span>Carregando ressalvas…</span></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwS7nH2Dlykwz844OJgsZC1c1Lqg0sDJBwzXRDgqz3T5Eh3qD3X_UFhRZXj4LDxFz7V/exec';
const FB_NODE   = 'retirados_expedicao';

Chart.register(ChartDataLabels);

const PAGE = { modal:1, motivos:1, promises:1, rotas:1, details:1 };
const PS   = { modal:8, motivos:5, promises:8, rotas:8, details:20 };

let DATA = null, barChart = null;
let REINC_MAP = {};
let db = null, fbReady = false;
let autoSavedToday = false;

// ── FIREBASE ─────────────────────────────────────────────────
const firebaseConfig = {
  apiKey           : 'AIzaSyCR-O8PWfKdTANDPnu59DeACPmAN-TrJsI',
  authDomain       : 'registrosmg15.firebaseapp.com',
  databaseURL      : 'https://registrosmg15-default-rtdb.firebaseio.com',
  projectId        : 'registrosmg15',
  storageBucket    : 'registrosmg15.firebasestorage.app',
  messagingSenderId: '353674201769',
  appId            : '1:353674201769:web:14f0e14647e85875b4b7b8'
};
firebase.initializeApp(firebaseConfig);
db = firebase.database();
firebase.auth().signInAnonymously()
  .then(() => { fbReady = true; })
  .catch(err => console.warn('[FB] auth error', err));

// ── DATE INIT ────────────────────────────────────────────────
const today = () => new Date().toISOString().split('T')[0];
document.getElementById('dateStart').value = today();
document.getElementById('dateEnd').value   = today();

// ── LOAD ─────────────────────────────────────────────────────
async function load() {
  const start = document.getElementById('dateStart').value;
  const end   = start;
  document.getElementById('dateEnd').value = start;
  const turno = document.getElementById('turno').value;
  if (!start) return;

  document.getElementById('content').innerHTML =
    '<div class="loader"><div class="spinner"></div><span>Carregando dados…</span></div>';

  const isToday = start === today();

  // Para datas passadas: tenta Firebase primeiro
  if (!isToday) {
    try {
      await waitFb();
      const snap = await db.ref(`${FB_NODE}/history/${start}`).once('value');
      const hist = snap.val();
      if (hist && hist.total != null) {
        DATA = {
          total        : hist.total        || 0,
          totalUSD     : hist.totalUSD     || 0,
          totalBRL     : hist.totalBRL     || 0,
          carriers     : hist.carriers     || {},
          modals       : hist.modals       || {},
          motivos      : hist.motivos      || {},
          mByCarrier   : hist.mByCarrier   || {},
          promises     : hist.promises     || {},
          rotas        : hist.rotas        || {},
          details      : hist.details      || [],
          carriersList : Object.keys(hist.carriers || {})
        };
        // Aplica filtro de turno se necessário
        if (turno === 'AM' || turno === 'PM') {
          DATA.details = DATA.details.filter(d => d.turno === turno);
        }
        PAGE.modal = PAGE.motivos = PAGE.promises = PAGE.rotas = PAGE.details = 1;
        REINC_MAP = {};
        render();
        loadReincidence();
        showToast(`Histórico de ${start} carregado do arquivo.`, 'success');
        return;
      } else {
        document.getElementById('content').innerHTML = `
          <div class="err-box">
            <strong>Sem histórico para ${start}</strong>
            Os dados deste dia não foram salvos. O histórico é salvo automaticamente às 20h enquanto o dashboard estiver aberto.<br>
            <small>Para o dia de hoje os dados são carregados em tempo real.</small>
          </div>`;
        return;
      }
    } catch(e) {
      console.warn('[hist fb]', e);
    }
  }

  try {
    const res  = await fetch(`${SCRIPT_URL}?startDate=${start}&endDate=${end}&turno=${turno}`);
    const text = await res.text();
    console.log('[retirados] raw:', text.slice(0, 400));
    if (text.trim().startsWith('<')) {
      throw new Error('O Apps Script retornou uma página HTML em vez de dados. Reimplante o script no Google Apps Script e tente novamente.');
    }
    DATA = JSON.parse(text);
    if (DATA.error) throw new Error(DATA.error);

    DATA.total        = DATA.total        || 0;
    DATA.carriers     = DATA.carriers     || {};
    DATA.modals       = DATA.modals       || {};
    DATA.motivos      = DATA.motivos      || {};
    DATA.mByCarrier   = DATA.mByCarrier   || {};
    DATA.promises     = DATA.promises     || {};
    DATA.rotas        = DATA.rotas        || {};
    DATA.details      = DATA.details      || [];
    DATA.carriersList = DATA.carriersList || Object.keys(DATA.carriers);

    PAGE.modal = PAGE.motivos = PAGE.promises = PAGE.rotas = PAGE.details = 1;
    REINC_MAP = {};

    render();
    loadReincidence();
    checkAutoSave();
  } catch(e) {
    console.error('[retirados]', e);
    document.getElementById('content').innerHTML = `
      <div class="err-box">
        <strong>Erro ao carregar dados</strong>
        ${e.message}<br>
        <small>Abra o Console (F12) para ver a resposta do servidor.</small>
      </div>`;
  }
}

function waitFb(ms = 3000) {
  if (fbReady) return Promise.resolve();
  return new Promise(resolve => {
    const t = Date.now();
    const iv = setInterval(() => { if (fbReady || Date.now()-t > ms) { clearInterval(iv); resolve(); } }, 100);
  });
}

// ── RENDER SHELL ─────────────────────────────────────────────
function render() {
  document.getElementById('content').innerHTML = `
    <div class="kpi-row" id="kpi-row"></div>
    <div class="kpi-row-fin" id="kpi-fin"></div>

    <div class="grid-a">
      <div class="card">
        <div class="card-head">
          <span class="card-title">Quantidade Retirada por Transportadora</span>
          <span class="card-badge" id="badge-carriers"></span>
        </div>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
      <div class="col">
        <div class="card">
          <div class="card-head">
            <span class="card-title">Retiradas por Modal</span>
            <span class="card-badge" id="badge-modals"></span>
          </div>
          <div class="tbl-wrap">
            <table><thead><tr><th>Tipo de Modal</th><th>Qtd</th></tr></thead>
            <tbody id="modal-body"></tbody></table>
          </div>
          <div class="pag" id="modal-pag"></div>
        </div>
        <div class="card">
          <div class="card-head">
            <span class="card-title">Motivos Ofensores</span>
            <span class="card-badge" id="badge-motivos"></span>
          </div>
          <div class="tbl-wrap">
            <table><thead><tr><th>Motivo</th><th>Qtd</th></tr></thead>
            <tbody id="motivos-body"></tbody></table>
          </div>
          <div class="pag" id="motivos-pag"></div>
        </div>
      </div>
    </div>

    <!-- Heatmap full-width -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Motivos Ofensores por Transportadora</span>
      </div>
      <div class="tbl-wrap" id="cross-wrap"></div>
    </div>

    <!-- Promises + Rotas side-by-side -->
    <div class="grid-c">
      <div class="card">
        <div class="card-head">
          <span class="card-title">Data das Promessas</span>
          <span class="card-badge" id="badge-promises"></span>
        </div>
        <div class="tbl-wrap">
          <table><thead><tr><th>Data</th><th>Qtd ↓</th></tr></thead>
          <tbody id="promises-body"></tbody></table>
        </div>
        <div class="pag" id="promises-pag"></div>
      </div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">Retiradas por Rota</span>
          <span class="card-badge" id="badge-rotas"></span>
        </div>
        <div class="tbl-wrap">
          <table><thead><tr><th>Rota</th><th>Qtd ↓</th></tr></thead>
          <tbody id="rotas-body"></tbody></table>
        </div>
        <div class="pag" id="rotas-pag"></div>
      </div>
    </div>

    <!-- RISK OF THE DAY -->
    <div class="risk-card" id="risk-card">
      <div class="risk-card-head">
        <div class="risk-card-head-icon">🚨</div>
        <div class="risk-card-head-text">
          <div class="risk-card-head-title">Risco do Dia — Promessas Comprometidas</div>
          <div class="risk-card-head-sub" id="risk-card-sub">Pacotes com promessa para hoje que foram retirados da rota</div>
        </div>
        <span id="risk-badge" style="background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px"></span>
      </div>
      <div id="risk-body"></div>
    </div>

    <!-- AI ANALYSIS -->
    <div class="card" id="ai-card" style="display:none">
      <div class="card-head">
        <span class="card-title">🤖 Análise de IA — Resumo &amp; Tratativas</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="reinc-summary" style="font-size:12px;color:var(--muted)"></span>
          <button class="btn-ai" id="btn-ai" onclick="analyzeWithAI()">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
            Analisar com IA
          </button>
        </div>
      </div>
      <div id="ai-body">
        <div class="ai-placeholder">
          <div style="font-size:32px">🤖</div>
          <p>Clique em <strong>Analisar com IA</strong> para obter um diagnóstico do período com resumo operacional, alertas e tratativas sugeridas.</p>
        </div>
      </div>
    </div>

    <!-- DETAILS TABLE -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Detalhes dos Pacotes</span>
        <span class="card-badge" id="badge-details">${DATA.details.length}</span>
      </div>
      <div class="details-toolbar">
        <input class="search-input" id="detail-search" placeholder="Filtrar por ID, transportadora, rota, motivo…" oninput="filterDetails()">
        <button class="btn-csv" onclick="downloadCSV()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download CSV
        </button>
      </div>
      <div class="tbl-wrap">
        <table class="details-tbl">
          <thead><tr>
            <th>#</th><th>ID / OBJECT_ID</th><th>Data</th><th>Turno</th>
            <th>Transportadora</th><th>Modal</th><th>Rota</th>
            <th>Motivo</th><th style="text-align:left">Promessa</th>
            <th>USD</th><th>R$</th>
            <th style="text-align:left">Reincidências</th>
          </tr></thead>
          <tbody id="details-body"></tbody>
        </table>
      </div>
      <div class="pag" id="details-pag"></div>
    </div>

`;

  renderKPIs();
  renderFinancials();
  renderRisk();
  renderBar();
  renderTable('modal-body',   'modal-pag',   'badge-modals',   DATA.modals,   'modal');
  renderMotivos();
  renderCross();
  renderTable('promises-body','promises-pag','badge-promises', DATA.promises, 'promises');
  renderTable('rotas-body',   'rotas-pag',   'badge-rotas',    DATA.rotas,    'rotas');
  renderDetails();
}

// ── KPI CARDS ────────────────────────────────────────────────
function renderKPIs() {
  const mk = Object.keys(DATA.modals),  mv = Object.values(DATA.modals);
  const ok = Object.keys(DATA.motivos), ov = Object.values(DATA.motivos);
  const rk = Object.keys(DATA.rotas),   rv = Object.values(DATA.rotas);
  const ck = Object.keys(DATA.carriers);
  const topModal  = mk[0] || '—', topModalN  = mv[0] || 0;
  const topMotivo = ok[0] || '—', topMotivoN = ov[0] || 0;
  const topRota   = rk[0] || '—', topRotaN   = rv[0] || 0;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card kpi-card-1">
      <div class="kpi-header">
        <div class="kpi-icon ic-red">📦</div>
      </div>
      <div class="kpi-label">Total Retirados</div>
      <div class="kpi-value kpi-value-xl">${DATA.total.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub">${ck.length} transportadora${ck.length!==1?'s':''} · ${rk.length} rota${rk.length!==1?'s':''}</div>
    </div>
    <div class="kpi-card kpi-card-2">
      <div class="kpi-header">
        <div class="kpi-icon ic-blue">🛣️</div>
      </div>
      <div class="kpi-label">Top Rota</div>
      <div class="kpi-value">${topRotaN.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub" title="${topRota}">${trunc(topRota, 26)}</div>
    </div>
    <div class="kpi-card kpi-card-3">
      <div class="kpi-header">
        <div class="kpi-icon ic-green">🚐</div>
      </div>
      <div class="kpi-label">Modal Principal</div>
      <div class="kpi-value">${topModalN.toLocaleString('pt-BR')}</div>
      <div class="kpi-sub" title="${topModal}">${trunc(topModal, 26)}</div>
    </div>
    <div class="kpi-card kpi-card-4">
      <div class="kpi-header">
        <div class="kpi-icon ic-amber">⚠️</div>
      </div>
      <div class="kpi-label">Top Motivo Ofensor</div>
      <div class="kpi-value">${topMotivoN ? topMotivoN.toLocaleString('pt-BR') : '—'}</div>
      <div class="kpi-sub" title="${topMotivo}">${topMotivo==='—'?'Sem ocorrências':trunc(topMotivo,26)}</div>
    </div>`;
}

// ── FINANCIAL KPIs ───────────────────────────────────────────
function renderFinancials(reincRisk = null) {
  const el = document.getElementById('kpi-fin');
  if (!el) return;
  const usd = (DATA.totalUSD || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  const brl = (DATA.totalBRL || 0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});

  let riskHtml;
  if (reincRisk === null) {
    riskHtml = `<div class="kpi-value" style="font-size:18px;color:var(--muted)">calculando…</div>`;
  } else if (reincRisk === 0) {
    riskHtml = `<div class="kpi-value" style="font-size:22px;color:var(--muted)">R$ 0,00</div><div class="kpi-sub">Sem reincidências</div>`;
  } else {
    const reincBrl = reincRisk.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
    riskHtml = `<div class="kpi-value" style="font-size:22px;color:#dc2626">R$ ${reincBrl}</div><div class="kpi-sub">valor de pacotes reincidentes</div>`;
  }

  el.innerHTML = `
    <div class="kpi-card kpi-card-usd">
      <div class="kpi-header"><div class="kpi-icon ic-sky">💵</div></div>
      <div class="kpi-label">Valor Total USD</div>
      <div class="kpi-value" style="font-size:24px">$ ${usd}</div>
      <div class="kpi-sub">${DATA.total} pacotes</div>
    </div>
    <div class="kpi-card kpi-card-brl">
      <div class="kpi-header"><div class="kpi-icon ic-green">💰</div></div>
      <div class="kpi-label">Valor Total R$</div>
      <div class="kpi-value" style="font-size:24px">R$ ${brl}</div>
      <div class="kpi-sub">${DATA.total} pacotes</div>
    </div>
    <div class="kpi-card kpi-card-risk">
      <div class="kpi-header"><div class="kpi-icon ic-amber">🔄</div></div>
      <div class="kpi-label">Valor em Risco (Reincid.)</div>
      ${riskHtml}
    </div>`;
}

// ── RISK OF THE DAY ──────────────────────────────────────────
function renderRisk() {
  const todayStr = document.getElementById('dateStart').value || new Date().toISOString().split('T')[0];
  const items    = DATA.details.filter(d => d.promise === todayStr);
  const body     = document.getElementById('risk-body');
  const badge    = document.getElementById('risk-badge');
  const sub      = document.getElementById('risk-card-sub');
  if (!body) return;

  badge.textContent = `${items.length} pacote${items.length !== 1 ? 's' : ''}`;

  if (!items.length) {
    sub.textContent  = `Nenhum pacote com promessa para ${fmtDate(todayStr)} foi retirado`;
    body.innerHTML   = `<div class="risk-empty">Nenhum pacote com promessa para ${fmtDate(todayStr)} foi retirado da rota</div>`;
    return;
  }

  const totalBrl = items.reduce((s, d) => s + (d.valBrl || 0), 0);
  const totalUsd = items.reduce((s, d) => s + (d.valUsd || 0), 0);

  // agrupado por transportadora
  const byCarrier = {};
  items.forEach(d => { byCarrier[d.carrier] = (byCarrier[d.carrier] || 0) + 1; });
  const topCarrier = Object.entries(byCarrier).sort((a,b) => b[1]-a[1])[0];

  sub.textContent = `${items.length} pacote${items.length!==1?'s':''} com promessa para ${fmtDate(todayStr)} retirado${items.length!==1?'s':''} da rota`;

  body.innerHTML = `
    <div class="risk-summary">
      <div class="risk-stat">
        <div class="risk-stat-label">Pacotes em risco</div>
        <div class="risk-stat-value danger">${items.length}</div>
      </div>
      <div class="risk-stat">
        <div class="risk-stat-label">Valor em R$</div>
        <div class="risk-stat-value ${totalBrl > 0 ? 'danger' : 'ok'}">
          ${totalBrl > 0 ? 'R$ '+totalBrl.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}
        </div>
      </div>
      <div class="risk-stat">
        <div class="risk-stat-label">Principal transportadora</div>
        <div class="risk-stat-value warn" style="font-size:16px;margin-top:8px">${topCarrier ? shortName(topCarrier[0])+' ('+topCarrier[1]+')' : '—'}</div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table class="risk-tbl">
        <thead><tr>
          <th>#</th><th>ID / OBJECT_ID</th><th>Transportadora</th>
          <th>Rota</th><th>Modal</th><th>Turno</th><th>Motivo</th>
          <th>USD</th><th>R$</th>
        </tr></thead>
        <tbody>
          ${items.map((d, i) => {
            const tCls = d.turno==='AM'?'turno-am':'turno-pm';
            return `<tr>
              <td style="color:var(--muted);text-align:right">${i+1}</td>
              <td><code style="font-size:11px;background:#fff1f2;color:#dc2626;padding:2px 6px;border-radius:5px;font-family:monospace">${d.id||'—'}</code></td>
              <td><span class="trunc" style="max-width:150px" title="${d.carrier}">${shortName(d.carrier)}</span></td>

// ── CROSS HEATMAP ────────────────────────────────────────────
function renderCross() {
  const motivos = Object.keys(DATA.mByCarrier);
  if (!motivos.length) {
    document.getElementById('cross-wrap').innerHTML = '<div class="empty">Sem dados de motivos no período</div>';
    return;
  }
  const count = {};
  motivos.forEach(m => Object.entries(DATA.mByCarrier[m]||{}).forEach(([c,n]) => count[c]=(count[c]||0)+n));
  const carriers = Object.keys(count).sort((a,b) => count[a]-count[b]);
  const maxV = Math.max(...Object.values(count), 1);
  const heat = v => !v?'h0':v<maxV*.2?'h1':v<maxV*.55?'h2':'h3';

  document.getElementById('cross-wrap').innerHTML = `
    <table class="heat-table">
      <thead><tr>
        <th>Motivo</th>
        ${carriers.map(c=>`<th style="min-width:88px;text-align:center">${shortName(c)}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${motivos.map(m=>`<tr>
          <td><span class="trunc" title="${m}" style="max-width:200px">${m}</span></td>
          ${carriers.map(c=>{ const v=(DATA.mByCarrier[m]||{})[c]||0; return `<td class="${heat(v)}">${v||'–'}</td>`; }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── CSV DOWNLOAD ─────────────────────────────────────────────
function downloadCSV() {
  if (!DATA || !DATA.details.length) return;
  const rows = detailsFiltered.length ? detailsFiltered : DATA.details;
  const header = ['ID','Data','Turno','Transportadora','Modal','Rota','Motivo','Promessa','Valor_USD','Valor_BRL','Reincidencias'];
  const lines = [header.join(';')];
  rows.forEach(d => {
    const rcDates = REINC_MAP[d.id];
    const reinc = rcDates && rcDates.length > 1 ? rcDates.filter(dt=>dt!==d.date).join('|') : '';
    const usd = d.valUsd ? String(d.valUsd).replace('.',',') : '';
    const brl = d.valBrl ? String(d.valBrl).replace('.',',') : '';
    lines.push([d.id, d.date, d.turno, d.carrier, d.modal, d.rota, `"${(d.motivo||'').replace(/"/g,'""')}"`, d.promise, usd, brl, reinc].join(';'));
  });
  const blob = new Blob(['﻿' + lines.join('\n')], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const start = document.getElementById('dateStart').value;
  const turno = document.getElementById('turno').value || 'todos';
  a.download = `retirados_${start}_${turno}.csv`;
  a.click();
}

// ── FIREBASE SAVE ────────────────────────────────────────────
async function saveHistory(silent = false) {
  if (!DATA) { if (!silent) showToast('Carregue dados primeiro.', 'error'); return; }
  if (!fbReady) { if (!silent) showToast('Firebase não pronto, aguarde.', 'error'); return; }

  const btn  = document.getElementById('btnSave');
  const date = document.getElementById('dateStart').value;

  if (!silent) {
    btn.disabled = true;
    btn.classList.add('saving');
    btn.innerHTML = '<span class="spinner-sm"></span> Salvando…';
  }

  try {
    await db.ref(`${FB_NODE}/history/${date}`).update({
      savedAt    : firebase.database.ServerValue.TIMESTAMP,
      total      : DATA.total,
      totalUSD   : DATA.totalUSD   || 0,
      totalBRL   : DATA.totalBRL   || 0,
      carriers   : DATA.carriers,
      modals     : DATA.modals,
      motivos    : DATA.motivos,
      mByCarrier : DATA.mByCarrier || {},
      promises   : DATA.promises   || {},
      rotas      : DATA.rotas,
      details    : DATA.details    || []
    });

    const updates = {};
    DATA.details.forEach(item => {
      if (!item.id) return;
      const safeId = item.id.toString().replace(/[.#$\[\]/]/g, '_');
      updates[`${FB_NODE}/id_index/${safeId}/${date}`] = 'saved';
    });
    if (Object.keys(updates).length) await db.ref().update(updates);

    if (silent) {
      showToast(`💾 Auto-salvo: ${DATA.total} pacotes de ${date}`);
    } else {
      showToast(`✓ ${DATA.total} pacotes salvos para ${date}`, 'success');
    }
  } catch (err) {
    console.error('[FB save]', err);
    if (!silent) showToast('Erro ao salvar: ' + err.message, 'error');
  } finally {
    if (!silent) {
      btn.disabled = false;
      btn.classList.remove('saving');
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salvar Histórico`;
    }
  }
}

// ── AUTO-SAVE ─────────────────────────────────────────────────
function checkAutoSave() {
  const h = new Date().getHours();
  if (h >= 20 && !autoSavedToday && DATA && DATA.total > 0) {
    autoSavedToday = true;
    setTimeout(() => saveHistory(true), 1500);
  }
}

function scheduleAutoSave() {
  const now    = new Date();
  const target = new Date();
  target.setHours(20, 0, 5, 0);
  if (target <= now) return; // já passou das 20h hoje — checkAutoSave cuida
  const ms = target - now;
  setTimeout(() => {
    if (DATA && DATA.total > 0 && !autoSavedToday) {
      autoSavedToday = true;
      saveHistory(true);
    }
  }, ms);
  console.log(`[auto-save] agendado em ${Math.round(ms/60000)} min`);
}

// ── REINCIDENCE ───────────────────────────────────────────────
async function loadReincidence() {
  if (!fbReady || !DATA || !DATA.details.length) return;
  try {
    const snap = await db.ref(`${FB_NODE}/id_index`).once('value');
    const index = snap.val() || {};
    REINC_MAP = {};
    DATA.details.forEach(item => {
      if (!item.id) return;
      const safeId = item.id.toString().replace(/[.#$\[\]/]/g, '_');
      const entry  = index[safeId];
      if (entry) {
        REINC_MAP[item.id] = Object.keys(entry).sort();
      }
    });
    const reincCount = Object.values(REINC_MAP).filter(dates => dates.length > 1).length;

    // Valor em risco: soma BRL dos pacotes reincidentes
    let reincRisk = 0;
    DATA.details.forEach(d => {
      const dates = REINC_MAP[d.id];
      if (dates && dates.length > 1) reincRisk += (d.valBrl || 0);
    });
    renderFinancials(reincRisk);

    renderDetails();
  } catch(e) { console.warn('[reinc]', e); }
}

async function analyzeWithAI() {

  const reincidents = Object.entries(REINC_MAP)

  try {
    const params = new URLSearchParams({
      action      : 'ai-summary',

      turno       : turno,
      reincidents : JSON.stringify(reincidents.slice(0, 20))
    });

    console.log('[AI] resposta bruta:', text.slice(0, 300));

// ── PAGINATION ───────────────────────────────────────────────
function renderPag(id, total, ps, pg, key) {
  const pages = Math.ceil(total/ps);
  const s = (pg-1)*ps+1, e = Math.min(pg*ps, total);
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `
    <span class="pag-info">${s}–${e} de ${total}</span>
    <button class="pag-btn" onclick="turnPage('${key}',-1)" ${pg<=1?'disabled':''}>‹</button>
    <button class="pag-btn" onclick="turnPage('${key}', 1)" ${pg>=pages?'disabled':''}>›</button>`;
}
window.turnPage = (key, dir) => {
  PAGE[key] += dir;
  if (key==='modal')    renderTable('modal-body',   'modal-pag',   'badge-modals',   DATA.modals,   'modal');
  if (key==='motivos')  renderMotivos();
  if (key==='promises') renderTable('promises-body','promises-pag','badge-promises', DATA.promises, 'promises');
  if (key==='rotas')    renderTable('rotas-body',   'rotas-pag',   'badge-rotas',    DATA.rotas,    'rotas');
  if (key==='details')  renderDetails();
};

      <div class="kpi-header"><div class="kpi-icon ic-sky">💵</div></div>
      <div class="kpi-label">Valor USD Recuperado</div>
      <div class="kpi-value" style="font-size:26px;color:#0284c7">$ ${fmtUsd(sumUsd)}</div>
      <div class="kpi-sub">${totalRev} pacote${totalRev!==1?'s':''}</div>
    </div>
    <div class="kpi-card kpi-card-taxa">
      <div class="kpi-header"><div class="kpi-icon" style="background:linear-gradient(135deg,#ede9fe,#ddd6fe)">📈</div></div>
      <div class="kpi-label">Taxa de Recuperação</div>
      <div class="kpi-value" style="font-size:42px;color:#7c3aed">${taxa}%</div>
      <div class="kpi-sub">${totalRev} de ${totalPkg}</div>
    </div>
  </div>`;

  let rows = '';
  if (allPkgs.length === 0) {
    rows = `<tr><td colspan="9" style="text-align:center;padding:36px;color:var(--muted)">
      📭 Carregue os dados no Dashboard primeiro ou selecione uma data com histórico salvo.
    </td></tr>`;
  } else if (pkgs.length === 0) {
    rows = `<tr><td colspan="9" style="text-align:center;padding:28px;color:var(--muted)">
      🔍 Nenhum pacote com ID contendo <strong>${_resSearch}</strong>
    </td></tr>`;
  } else {
    rows = pkgs.map(pkg => {
      const sid  = safeId(pkg.id);
      const rev  = RES_DATA[sid];
      const isRev = !!rev;
      const hora  = isRev ? new Date(rev.t).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : '';
      return `<tr class="${isRev ? 'rev-row' : ''}">
        <td><span class="pkg-id" onclick="navigator.clipboard.writeText('${pkg.id}')" title="Clique para copiar">${pkg.id || '—'}</span></td>
        <td>${pkg.carrier || '—'}</td>
        <td>${pkg.rota || '—'}</td>
        <td>${pkg.turno || '—'}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(pkg.motivo||'').replace(/"/g,'&quot;')}">${pkg.motivo || '—'}</td>
        <td style="white-space:nowrap;font-weight:600">R$ ${fmtBrl(pkg.valBrl||0)}</td>
        <td style="white-space:nowrap;font-weight:600">$ ${fmtUsd(pkg.valUsd||0)}</td>
        <td>${isRev
          ? `<span class="badge-rev">✓ Revertido</span>
             <div class="rev-meta">${rev.op || 'Anônimo'} · ${hora}</div>
             ${rev.obs ? `<div class="rev-obs-txt">${rev.obs}</div>` : ''}`
          : `<input class="obs-inp" id="obs-${sid}" placeholder="Obs. (opcional)">`
        }</td>
        <td>${isRev
          ? `<button class="btn-rev btn-undo" onclick="unmarkRessalva('${sid}','${date}')">Desfazer</button>`
          : `<button class="btn-rev" onclick="markRessalva('${sid}','${date}')">✓ Reverter</button>`
        }</td>
      </tr>`;
    }).join('');
  }

  const opVal = localStorage.getItem('ret_op_rev') || '';
  const tableHtml = `<div class="res-wrap">
    <div class="res-wrap-head">
      <div>
        <div class="res-wrap-title">Pacotes Retirados · ${date || 'selecione uma data'}</div>
        <div class="res-wrap-sub">${allPkgs.length} pacote${allPkgs.length!==1?'s':''} · ${totalRev} revertido${totalRev!==1?'s':''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="position:relative">
          <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="res-search-inp" placeholder="Buscar ID..." value="${_resSearch}"
            oninput="_resSearch=this.value;renderRessalvas()"
            style="border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;font-size:13px;font-family:'Inter',sans-serif;outline:none;width:180px;color:var(--navy)">
        </div>
        <button class="btn" style="background:linear-gradient(135deg,#3b82f6,#60a5fa);font-size:12px;padding:7px 14px" onclick="exportRessalvas('${date}')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar CSV
        </button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="res-tbl">
        <thead><tr>
          <th>ID Pacote</th><th>Transportadora</th><th>Rota</th><th>Turno</th>
          <th>Motivo Ofensor</th><th>Valor BRL</th><th>Valor USD</th>
          <th>Observação / Status</th><th>Ação</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;

  document.getElementById('ressalvas-content').innerHTML =
    `<div class="res-op-bar">
       <label>Operador:</label>
       <input class="res-op-input" id="res-op" type="text" placeholder="Seu nome" value="${opVal}"
         oninput="localStorage.setItem('ret_op_rev',this.value)">
       <span style="font-size:12px;color:var(--muted);margin-left:4px">— identifica quem fez a reversão</span>
     </div>` + kpiHtml + tableHtml;
}

async function markRessalva(sid, date) {
  const pkg = RES_PKGS[sid];
  if (!pkg) { showToast('Pacote não encontrado.', 'error'); return; }
  await waitFb();
  const op  = (document.getElementById('res-op')?.value || '').trim() || 'Anônimo';
  const obs = (document.getElementById('obs-' + sid)?.value || '').trim();
  const payload = {
    id      : pkg.id,
    t       : Date.now(),
    op,
    carrier : pkg.carrier || '',
    rota    : pkg.rota    || '',
    turno   : pkg.turno   || '',
    motivo  : pkg.motivo  || '',
    promise : pkg.promise || '',
    valUsd  : pkg.valUsd  || 0,
    valBrl  : pkg.valBrl  || 0
  };
  if (obs) payload.obs = obs;
  await db.ref(`${FB_NODE}/ressalvas/${date}/${sid}`).set(payload);
}

async function unmarkRessalva(sid, date) {
  if (!confirm('Remover reversão deste pacote?')) return;
  await waitFb();
  await db.ref(`${FB_NODE}/ressalvas/${date}/${sid}`).remove();
}

function exportRessalvas(date) {
  const revs = Object.values(RES_DATA);
  if (!revs.length) { showToast('Nenhum revertido para exportar.', 'error'); return; }
  const header = 'ID,Transportadora,Rota,Turno,Motivo,Valor BRL,Valor USD,Operador,Hora,Observacao';
  const q = v => `"${String(v || '').replace(/"/g,'""')}"`;
  const csvRows = revs.map(r => [
    r.id, r.carrier, r.rota, r.turno, r.motivo,
    (r.valBrl||0).toFixed(2), (r.valUsd||0).toFixed(2),
    r.op, new Date(r.t).toLocaleString('pt-BR'), r.obs || ''
  ].map(q).join(','));
  const blob = new Blob([[header, ...csvRows].join('\n')], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ressalvas_${date}.csv`;
  a.click();
}

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('dateStart').addEventListener('change', () => { load(); if (_resListener) loadRessalvas(); });
document.getElementById('turno').addEventListener('change',     load);
scheduleAutoSave();
load();
</script>
