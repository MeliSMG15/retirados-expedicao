<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retirados da Expedição · SMG15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root{
  --bg:#f0f2f7;
  --surface:#ffffff;
  --brand:#e5272a;
  --brand-lt:#fef2f2;
  --brand-dk:#c01f22;
  --brand-glow:rgba(229,39,42,.15);
  --navy:#111827;
  --slate:#374151;
  --muted:#6b7280;
  --border:#e5e7eb;
  --border-lt:#f3f4f6;
  --row-hover:#fafbfc;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 10px 30px rgba(0,0,0,.08);
  --shadow-lg:0 8px 16px rgba(0,0,0,.06),0 20px 40px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--navy);font-size:13.5px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ═══ TOPBAR ════════════════════════════════════════ */
.topbar{
  background:linear-gradient(135deg,#111827 0%,#1f2937 100%);
  border-bottom:2px solid var(--brand);
  padding:0 32px;height:68px;
  display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.25);
}
.brand{display:flex;align-items:center;gap:14px;flex:1}
.brand-icon{
  width:42px;height:42px;
  background:linear-gradient(135deg,var(--brand),#f87171);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;box-shadow:0 4px 12px var(--brand-glow);
}
.brand-text{}
.brand-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.2px;line-height:1.2}
.brand-sub{color:#9ca3af;font-size:11px;letter-spacing:.3px;margin-top:1px}
.filters{display:flex;align-items:center;gap:8px}
.fpill{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:8px 14px;cursor:pointer;
  transition:all .2s;
}
.fpill:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18)}
.fpill svg{color:#9ca3af;flex-shrink:0}
.fpill input,.fpill select{
  border:none;outline:none;background:transparent;
  color:#f9fafb;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;
}
.fpill input{min-width:108px}
.fpill select{min-width:130px}
.fpill select option{color:#111;background:#fff}
.fpill input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5;cursor:pointer}
.fsep{color:rgba(255,255,255,.25);font-size:13px;margin:0 2px}
.btn{
  color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;
  font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;
  font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;letter-spacing:.1px;
}
.btn-refresh{
  background:linear-gradient(135deg,var(--brand),#f87171);
  box-shadow:0 4px 12px var(--brand-glow);
}
.btn-refresh:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--brand-glow)}
.btn-save{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 4px 12px rgba(5,150,105,.2)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(5,150,105,.3)}
.btn-save.saving{background:linear-gradient(135deg,#6b7280,#9ca3af);transform:none;cursor:not-allowed;box-shadow:none}

/* ═══ CONTENT ═══════════════════════════════════════ */
.content{padding:28px 32px;display:flex;flex-direction:column;gap:22px}

/* ═══ KPI ROW ════════════════════════════════════════ */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi-card{
  background:var(--surface);border-radius:var(--radius);padding:20px 22px 18px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
  animation:fadeUp .35s ease both;cursor:default;
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-card:nth-child(2){animation-delay:.06s}
.kpi-card:nth-child(3){animation-delay:.12s}
.kpi-card:nth-child(4){animation-delay:.18s}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--kpi-accent,var(--brand));border-radius:var(--radius) var(--radius) 0 0;
}
.kpi-card-1{--kpi-accent:linear-gradient(90deg,#e5272a,#f87171)}
.kpi-card-2{--kpi-accent:linear-gradient(90deg,#2563eb,#60a5fa)}
.kpi-card-3{--kpi-accent:linear-gradient(90deg,#059669,#34d399)}
.kpi-card-4{--kpi-accent:linear-gradient(90deg,#d97706,#fbbf24)}
.kpi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.ic-red{background:linear-gradient(135deg,#fee2e2,#fecaca)}
.ic-blue{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.ic-green{background:linear-gradient(135deg,#d1fae5,#a7f3d0)}
.ic-amber{background:linear-gradient(135deg,#fef3c7,#fde68a)}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px}
.kpi-value{font-size:36px;font-weight:800;line-height:1;color:var(--navy);letter-spacing:-1px}
.kpi-sub{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px}

/* ═══ CARDS ══════════════════════════════════════════ */
.card{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);
  overflow:hidden;animation:fadeUp .35s ease both;
}
.card-head{
  padding:16px 20px;border-bottom:1px solid var(--border-lt);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-shrink:0;background:linear-gradient(180deg,#fafbfc 0%,#ffffff 100%);
}
.card-title{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--slate);
}
.card-badge{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
  background:var(--brand-lt);color:var(--brand);border:1px solid #fecaca;
}

/* ═══ LAYOUT ══════════════════════════════════════════ */
.grid-a{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:stretch}
.grid-c{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.col{display:flex;flex-direction:column;gap:22px}
.grid-a>.card{display:flex;flex-direction:column}
.grid-a>.card .card-head{flex-shrink:0}

/* ═══ CHART ══════════════════════════════════════════ */
.chart-wrap{flex:1;min-height:270px;padding:18px 20px 28px;position:relative}

/* ═══ TABLES ══════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  background:linear-gradient(180deg,#f9fafb,#f3f4f6);
  color:var(--muted);font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;
  padding:11px 16px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
thead th:last-child{text-align:right}
tbody tr{transition:background .12s}
tbody tr:nth-child(even) td{background:#fafbfc}
tbody tr:hover td{background:#f0f2ff !important}
tbody td{
  padding:11px 16px;border-bottom:1px solid var(--border-lt);
  font-size:13px;color:var(--navy);
}
tbody td:last-child{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;color:var(--navy)}
tbody tr:last-child td{border-bottom:none}

.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:800;
  margin-right:8px;flex-shrink:0;vertical-align:middle;
}
.r1{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;box-shadow:0 2px 6px rgba(245,158,11,.3)}
.r2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#1e293b}
.r3{background:linear-gradient(135deg,#92400e,#b45309);color:#fff}
.rn{background:#f1f5f9;color:var(--muted)}

.trunc{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}

/* ═══ HEATMAP ══════════════════════════════════════════ */
.heat-table thead th{
  background:linear-gradient(135deg,#111827,#1f2937);
  color:rgba(255,255,255,.7);
}
.heat-table thead th:first-child{text-align:left;min-width:180px}
.heat-table tbody td{text-align:center !important;font-weight:700;font-size:12.5px}
.heat-table tbody td:first-child{text-align:left !important;font-weight:400;font-size:12px;color:var(--slate)}
.h0{color:#d1d5db}
.h1{background:#fef2f2;color:#dc2626}
.h2{background:#fecaca;color:#991b1b}
.h3{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}

/* ═══ PAGINATION ══════════════════════════════════════ */
.pag{
  display:flex;align-items:center;gap:6px;
  padding:11px 16px;border-top:1px solid var(--border-lt);
  font-size:12px;color:var(--muted);background:#fafbfc;
}
.pag-info{flex:1}
.pag-btn{
  width:30px;height:30px;border:1px solid var(--border);background:var(--surface);
  border-radius:8px;cursor:pointer;font-size:16px;color:var(--slate);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.pag-btn:hover:not(:disabled){background:var(--brand);color:#fff;border-color:var(--brand);transform:scale(1.05)}
.pag-btn:disabled{opacity:.3;cursor:default}

/* ═══ DETAILS TABLE ════════════════════════════════════ */
.details-toolbar{
  padding:14px 20px;border-bottom:1px solid var(--border-lt);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:linear-gradient(180deg,#fafbfc,#fff);
}
.search-input{
  flex:1;min-width:220px;
  border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:all .2s;background:#fafbfc;color:var(--navy);
}
.search-input:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.search-input::placeholder{color:#9ca3af}
.btn-csv{
  background:linear-gradient(135deg,#111827,#1f2937);
  color:#fff;border:none;border-radius:10px;
  padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;
  transition:all .2s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.btn-csv:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.reinc-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:#fffbeb;color:#92400e;border:1px solid #fde68a;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;
  vertical-align:middle;margin-left:5px;cursor:help;
}
.reinc-badge-red{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.details-tbl thead th:last-child{text-align:left}
.details-tbl tbody td:last-child{text-align:left;font-weight:400}
.turno-am{
  background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#1d4ed8;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.3px;
}
.turno-pm{
  background:linear-gradient(135deg,#f5f3ff,#ede9fe);color:#5b21b6;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.3px;
}

/* ═══ HISTORY PANEL ════════════════════════════════════ */
.history-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;padding:18px 20px;
}
.hist-day{
  border:1px solid var(--border);border-radius:12px;padding:14px 16px;
  cursor:pointer;transition:all .2s;background:var(--surface);
  position:relative;overflow:hidden;
}
.hist-day::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--brand),#f87171);
  opacity:0;transition:opacity .2s;
}
.hist-day:hover{
  border-color:var(--brand);
  box-shadow:0 4px 16px var(--brand-glow);
  transform:translateY(-2px);
}
.hist-day:hover::before{opacity:1}
.hist-day-date{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.hist-day-total{font-size:28px;font-weight:800;color:var(--brand);line-height:1.1;margin:4px 0;letter-spacing:-1px}
.hist-day-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ TOAST ════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:28px;right:28px;z-index:999;
  color:#fff;padding:13px 20px;border-radius:12px;
  font-size:13px;font-weight:600;
  box-shadow:0 8px 30px rgba(0,0,0,.2);
  animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:8px;
}
.toast.success{background:linear-gradient(135deg,#059669,#10b981)}
.toast.error{background:linear-gradient(135deg,var(--brand),#f87171)}
.toast:not(.success):not(.error){background:linear-gradient(135deg,#111827,#1f2937)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══ EMPTY / LOADING / ERROR ══════════════════════════ */
.empty{
  text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;
}
.empty::before{display:block;font-size:28px;margin-bottom:8px;content:attr(data-icon)}
.loader{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px;gap:16px;color:var(--muted);
}
.loader span{font-size:13px;font-weight:500}
.spinner{
  width:42px;height:42px;
  border:3px solid var(--border);border-top-color:var(--brand);
  border-radius:50%;animation:spin .75s linear infinite;
}
.spinner-sm{
  width:15px;height:15px;border-width:2px;display:inline-block;
  border-color:rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .75s linear infinite;vertical-align:middle;
}
.err-box{
  background:linear-gradient(135deg,#fff5f5,#fff);
  border:1px solid #fecaca;border-radius:var(--radius);
  padding:32px;color:var(--brand-dk);text-align:center;
}
.err-box strong{font-size:16px;font-weight:700;display:block;margin-bottom:8px}
.err-box small{color:var(--muted);font-size:12px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══════════════════════════════════════════════ -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">📦</div>
    <div class="brand-text">
      <div class="brand-title">Retirados da Expedição</div>
      <div class="brand-sub">SMG15 · Simões Filho · Last Mile</div>
    </div>
  </div>
  <div class="filters">
    <div class="fpill">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <input type="date" id="dateStart">
      <span class="fsep">–</span>
      <input type="date" id="dateEnd">
    </div>
    <div class="fpill">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <select id="turno">
        <option value="">Todos os turnos</option>
        <option value="AM">AM · Manhã</option>
        <option value="PM">PM · Tarde</option>
      </select>
    </div>
    <button class="btn btn-save" id="btnSave" onclick="saveHistory()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Salvar Histórico
    </button>
    <button class="btn btn-refresh" onclick="load()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Atualizar
    </button>
  </div>
</div>

<!-- ═══ CONTENT ══════════════════════════════════════════════ -->
<div class="content" id="content">
  <div class="loader"><div class="spinner"></div><span>Carregando dados…</span></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwS7nH2Dlykwz844OJgsZC1c1Lqg0sDJBwzXRDgqz3T5Eh3qD3X_UFhRZXj4LDxFz7V/exec';
const FB_NODE   = 'retirados_expedicao';

Chart.register(ChartDataLabels);

const PAGE = { modal:1, motivos:1, promises:1, rotas:1, details:1 };
const PS   = { modal:8, motivos:5, promises:8, rotas:8, details:20 };

let DATA = null, barChart = null;
let REINC_MAP = {};  // objectId → [date1, date2, ...]
let db = null, fbReady = false;

// ── FIREBASE ─────────────────────────────────────────────────
const firebaseConfig = {
  apiKey           : 'AIzaSyCR-O8PWfKdTANDPnu59DeACPmAN-TrJsI',
  authDomain       : 'registrosmg15.firebaseapp.com',
  databaseURL      : 'https://registrosmg15-default-rtdb.firebaseio.com',
  projectId        : 'registrosmg15',
  storageBucket    : 'registrosmg15.firebasestorage.app',
  messagingSenderId: '353674201769',
  appId            : '1:353674201769:web:14f0e14647e85875b4b7b8'
};
firebase.initializeApp(firebaseConfig);
db = firebase.database();
firebase.auth().signInAnonymously()
  .then(() => { fbReady = true; })
  .catch(err => console.warn('[FB] auth error', err));

// ── DATE INIT ────────────────────────────────────────────────
const today = () => new Date().toISOString().split('T')[0];
document.getElementById('dateStart').value = today();
document.getElementById('dateEnd').value   = today();

// ── LOAD ─────────────────────────────────────────────────────
async function load() {
  const start = document.getElementById('dateStart').value;
  const end   = document.getElementById('dateEnd').value;
  const turno = document.getElementById('turno').value;
  if (!start || !end) return;

  document.getElementById('content').innerHTML =
    '<div class="loader"><div class="spinner"></div><span>Carregando dados…</span></div>';

  try {
    const res  = await fetch(`${SCRIPT_URL}?startDate=${start}&endDate=${end}&turno=${turno}`);
    const text = await res.text();
    console.log('[retirados] raw:', text.slice(0, 400));
    DATA = JSON.parse(text);
    if (DATA.error) throw new Error(DATA.error);

    DATA.total        = DATA.total        || 0;
    DATA.carriers     = DATA.carriers     || {};
    DATA.modals       = DATA.modals       || {};
    DATA.motivos      = DATA.motivos      || {};
    DATA.mByCarrier   = DATA.mByCarrier   || {};
    DATA.promises     = DATA.promises     || {};
    DATA.rotas        = DATA.rotas        || {};
    DATA.details      = DATA.details      || [];
    DATA.carriersList = DATA.carriersList || Object.keys(DATA.carriers);

    PAGE.modal = PAGE.motivos = PAGE.promises = PAGE.rotas = PAGE.details = 1;
    REINC_MAP = {};

    render();
    loadReincidence();   // async, updates table when ready
  } catch(e) {
    console.error('[retirados]', e);

// ── GENERIC TABLE ────────────────────────────────────────────
function renderTable(tbodyId, pagId, badgeId, obj, key) {
  const entries = Object.entries(obj);
  const total = entries.length;
  const ps = PS[key], pg = PAGE[key];
  const slice = entries.slice((pg-1)*ps, pg*ps);
  if (badgeId) document.getElementById(badgeId).textContent = total;
  if (!total) {
    document.getElementById(tbodyId).innerHTML = `<tr><td colspan="2" class="empty">Sem dados no período</td></tr>`;
    document.getElementById(pagId).innerHTML = '';
    return;
  }
  document.getElementById(tbodyId).innerHTML = slice.map(([k,v], i) => {
    const n = (pg-1)*ps+i+1;
    const cls = n===1?'r1':n===2?'r2':n===3?'r3':'rn';
    return `<tr><td><span class="rank-badge ${cls}">${n}</span><span class="trunc" title="${k}" style="max-width:160px">${k}</span></td><td>${v.toLocaleString('pt-BR')}</td></tr>`;
  }).join('');
  renderPag(pagId, total, ps, pg, key);
}

// ── CROSS HEATMAP ────────────────────────────────────────────
function renderCross() {
  const motivos = Object.keys(DATA.mByCarrier);
  if (!motivos.length) {
    document.getElementById('cross-wrap').innerHTML = '<div class="empty">Sem dados de motivos no período</div>';
    return;
  }
  const count = {};
  motivos.forEach(m => Object.entries(DATA.mByCarrier[m]||{}).forEach(([c,n]) => count[c]=(count[c]||0)+n));
  const carriers = Object.keys(count).sort((a,b) => count[a]-count[b]);
  const maxV = Math.max(...Object.values(count), 1);
  const heat = v => !v?'h0':v<maxV*.2?'h1':v<maxV*.55?'h2':'h3';

  document.getElementById('cross-wrap').innerHTML = `
    <table class="heat-table">
      <thead><tr>
        <th>Motivo</th>
        ${carriers.map(c=>`<th style="min-width:88px;text-align:center">${shortName(c)}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${motivos.map(m=>`<tr>
          <td><span class="trunc" title="${m}" style="max-width:200px">${m}</span></td>
          ${carriers.map(c=>{ const v=(DATA.mByCarrier[m]||{})[c]||0; return `<td class="${heat(v)}">${v||'–'}</td>`; }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>`;
}

  const q = (document.getElementById('detail-search').value || '').toLowerCase();
  detailsFiltered = q
    ? DATA.details.filter(d =>
        (d.id||'').toLowerCase().includes(q) ||
        (d.carrier||'').toLowerCase().includes(q) ||
        (d.rota||'').toLowerCase().includes(q) ||
        (d.motivo||'').toLowerCase().includes(q) ||
        (d.modal||'').toLowerCase().includes(q))
    : [...DATA.details];
  PAGE.details = 1;
  renderDetails();

// ── CSV DOWNLOAD ─────────────────────────────────────────────
function downloadCSV() {
  if (!DATA || !DATA.details.length) return;
  const rows = detailsFiltered.length ? detailsFiltered : DATA.details;
  const header = ['ID','Data','Turno','Transportadora','Modal','Rota','Motivo','Promessa','Reincidencias'];
  const lines = [header.join(';')];
  rows.forEach(d => {
    const rcDates = REINC_MAP[d.id];
    const reinc = rcDates && rcDates.length > 1 ? rcDates.filter(dt=>dt!==d.date).join('|') : '';
    lines.push([d.id, d.date, d.turno, d.carrier, d.modal, d.rota, `"${(d.motivo||'').replace(/"/g,'""')}"`, d.promise, reinc].join(';'));
  });
  const blob = new Blob(['﻿' + lines.join('\n')], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const start = document.getElementById('dateStart').value;
  const turno = document.getElementById('turno').value || 'todos';
  a.download = `retirados_${start}_${turno}.csv`;
  a.click();
}

// ── FIREBASE SAVE ────────────────────────────────────────────
async function saveHistory() {
  if (!DATA) return showToast('Carregue dados primeiro.', 'error');
  if (!fbReady) return showToast('Firebase não pronto, aguarde.', 'error');

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.classList.add('saving');
  btn.innerHTML = '<span class="spinner-sm"></span> Salvando…';

  const date  = document.getElementById('dateStart').value;
  const turno = document.getElementById('turno').value || 'all';

  try {
    // Salva resumo do dia
    await db.ref(`${FB_NODE}/history/${date}`).update({
      savedAt  : firebase.database.ServerValue.TIMESTAMP,
      total    : DATA.total,
      turno    : turno,
      carriers : DATA.carriers,
      modals   : DATA.modals,
      motivos  : DATA.motivos,
      rotas    : DATA.rotas
    });

    // Atualiza índice de reincidência (id → {data: turno})
    const updates = {};
    DATA.details.forEach(item => {
      if (!item.id) return;
      const safeId = item.id.toString().replace(/[.#$\[\]/]/g, '_');
      updates[`${FB_NODE}/id_index/${safeId}/${date}`] = turno || 'all';
    });
    if (Object.keys(updates).length) await db.ref().update(updates);

    showToast(`✓ ${DATA.total} pacotes salvos para ${date}`, 'success');
    loadHistory();
  } catch (err) {
    console.error('[FB save]', err);
    showToast('Erro ao salvar: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('saving');
    btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salvar Histórico`;
  }
}

// ── LOAD HISTORY ─────────────────────────────────────────────
async function loadHistory() {
  if (!fbReady) return;
  try {
    const snap = await db.ref(`${FB_NODE}/history`).once('value');
    const hist = snap.val() || {};
    const days = Object.keys(hist).sort().reverse();

    const badge = document.getElementById('badge-history');
    const body  = document.getElementById('history-body');
    if (!badge || !body) return;

    badge.textContent = `${days.length} dias`;
    if (!days.length) {
      body.innerHTML = '<div class="empty">Nenhum histórico salvo ainda.</div>';
      return;
    }

    body.innerHTML = `<div class="history-grid">
      ${days.map(d => {
        const h = hist[d];
        const topC = Object.keys(h.carriers||{})[0] || '—';
        return `<div class="hist-day" onclick="loadDay('${d}')">
          <div class="hist-day-date">${fmtDate(d)}</div>
          <div class="hist-day-total">${(h.total||0).toLocaleString('pt-BR')}</div>
          <div class="hist-day-meta">${shortName(topC)} · ${h.turno||'all'}</div>
        </div>`;
      }).join('')}
    </div>`;
  } catch(e) { console.warn('[hist]', e); }
}

function loadDay(date) {
  document.getElementById('dateStart').value = date;
  document.getElementById('dateEnd').value   = date;
  document.getElementById('turno').value     = '';
  load();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── REINCIDENCE ───────────────────────────────────────────────
async function loadReincidence() {
  if (!fbReady || !DATA || !DATA.details.length) return;
  try {
    const snap = await db.ref(`${FB_NODE}/id_index`).once('value');
    const index = snap.val() || {};
    REINC_MAP = {};
    DATA.details.forEach(item => {
      if (!item.id) return;
      const safeId = item.id.toString().replace(/[.#$\[\]/]/g, '_');
      const entry  = index[safeId];
      if (entry) {
        REINC_MAP[item.id] = Object.keys(entry).sort();
      }
    });
    const reincCount = Object.values(REINC_MAP).filter(dates => dates.length > 1).length;
    const el = document.getElementById('reinc-summary');
    if (el) {
      el.textContent = reincCount > 0
        ? `🔄 ${reincCount} ID${reincCount!==1?'s':''} reincidente${reincCount!==1?'s':''}`
        : '';
      if (reincCount > 0) el.style.color = '#dc2626';
    }
    renderDetails();   // re-render with reincidence badges
  } catch(e) { console.warn('[reinc]', e); }
}

// ── AI ANALYSIS ──────────────────────────────────────────────
async function analyzeWithAI() {
  const btn = document.getElementById('btn-ai');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span> Analisando…';

  const start = document.getElementById('dateStart').value;
  const end   = document.getElementById('dateEnd').value;
  const turno = document.getElementById('turno').value;

  const reincidents = Object.entries(REINC_MAP)
    .filter(([, dates]) => dates.length > 1)
    .map(([id, dates]) => ({ id, dates }));

  try {
    const params = new URLSearchParams({
      action      : 'ai-summary',
      startDate   : start,
      endDate     : end,
      turno       : turno,
      reincidents : JSON.stringify(reincidents.slice(0, 20))
    });
    const res    = await fetch(`${SCRIPT_URL}?${params}`);
    const text   = await res.text();
    console.log('[AI] resposta bruta:', text.slice(0, 300));
    const result = JSON.parse(text);
    if (result.error) throw new Error(result.error);
    if (!result.analysis) throw new Error('Apps Script não reconheceu action=ai-summary. Reimplante o script com a versão mais recente.');
    renderAIResult(result.analysis);
  } catch(e) {
    document.getElementById('ai-body').innerHTML = `<div class="err-box"><strong>Erro na análise</strong>${e.message}<br><small>Verifique se o Apps Script foi reimplantado com a versão mais recente.</small></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg> Analisar com IA`;
  }
}

function renderAIResult(a) {
  if (!a) return;
  const prioClass = p => p==='alta'?'prio-alta':p==='media'?'prio-media':'prio-baixa';
  document.getElementById('ai-body').innerHTML = `
    <div class="ai-result">
      <div>
        <div class="ai-section-title">📊 Resumo Operacional</div>
        <div class="ai-resumo">${a.resumo||'—'}</div>
      </div>
      ${a.alertas && a.alertas.length ? `
      <div>
        <div class="ai-section-title">⚠️ Alertas</div>
        <div class="ai-alertas">${a.alertas.map(x=>`<div class="ai-alerta-item">${x}</div>`).join('')}</div>
      </div>` : ''}
      ${a.tratativas && a.tratativas.length ? `
      <div>
        <div class="ai-section-title">✅ Tratativas Sugeridas</div>
        <div class="ai-tratativas">${a.tratativas.map(t=>`
          <div class="ai-trat-item">
            <span class="prio-badge ${prioClass(t.prioridade)}">${(t.prioridade||'—').toUpperCase()}</span>
            <div class="ai-trat-body"><strong>${t.titulo}</strong><p>${t.detalhe}</p></div>
          </div>`).join('')}
        </div>
      </div>` : ''}
      ${a.monitoramento ? `
      <div>
        <div class="ai-section-title">👁 Monitoramento Contínuo</div>
        <div class="ai-monitoring">${a.monitoramento}</div>
      </div>` : ''}
    </div>`;
}

// ── PAGINATION ───────────────────────────────────────────────
function renderPag(id, total, ps, pg, key) {
  const pages = Math.ceil(total/ps);
  const s = (pg-1)*ps+1, e = Math.min(pg*ps, total);
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `
    <span class="pag-info">${s}–${e} de ${total}</span>
    <button class="pag-btn" onclick="turnPage('${key}',-1)" ${pg<=1?'disabled':''}>‹</button>
    <button class="pag-btn" onclick="turnPage('${key}', 1)" ${pg>=pages?'disabled':''}>›</button>`;
}
window.turnPage = (key, dir) => {
  PAGE[key] += dir;
  if (key==='modal')    renderTable('modal-body',   'modal-pag',   'badge-modals',   DATA.modals,   'modal');
  if (key==='motivos')  renderMotivos();
  if (key==='promises') renderTable('promises-body','promises-pag','badge-promises', DATA.promises, 'promises');
  if (key==='rotas')    renderTable('rotas-body',   'rotas-pag',   'badge-rotas',    DATA.rotas,    'rotas');
  if (key==='details')  renderDetails();
};

const fmtDate = s => {
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
};

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
